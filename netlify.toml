# ============================================
# MINT MEDICAL CLINIC - NETLIFY CONFIGURATION
# ============================================
# Site ID: 38e7c65c-9693-4bec-9e83-e2312bd923db
# Site Name: mint-medical-clinic
# Live URL: https://www.mintmedicalclinic.com
#
# WARNING: DO NOT DEPLOY THIS TO ANY OTHER SITE
# ============================================

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect for blog webhook
[[redirects]]
  from = "/api/blog-webhook"
  to = "/.netlify/functions/blog-webhook-simple"
  status = 200

# Redirect for admin auth
[[redirects]]
  from = "/api/admin-auth"
  to = "/.netlify/functions/admin-auth"
  status = 200

# Pretty URLs for blog articles (optional - for cleaner URLs)
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/article.html?slug=:slug"
  status = 200

# Location pages - clean URLs
[[redirects]]
  from = "/locations/"
  to = "/locations/index.html"
  status = 200

[[redirects]]
  from = "/locations/:city/"
  to = "/locations/:city.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/data/articles.json"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
